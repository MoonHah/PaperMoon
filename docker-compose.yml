services:

  # ── 基础服务 ────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: papermoon
      POSTGRES_DB: papermoon
    ports:
      - "5432:5432"   # 暴露给宿主机：本地脚本（eval/agent 验证）需要直连（同 qdrant 6333 的先例）
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # healthcheck 让 api/worker 等到 postgres 真正可接受连接才启动
    # 没有这个，容器启动了但 postgres 还没 ready，api 会报连接失败
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    # Redis 启动极快，不需要 healthcheck

  qdrant:
    image: qdrant/qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── 应用服务（共用同一份镜像，command 不同）─────────────────────

  model-service:
    build:
      context: ./model_service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8009:8009"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8009/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build: .
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8008
    ports:
      - "8008:8008"
    env_file:
      - .env                          # 加载 LLM key 等敏感配置
    environment:
      # 覆盖 .env 里的 localhost 地址，改成容器服务名
      DATABASE_URL: postgresql://postgres:papermoon@postgres:5432/papermoon
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      MODEL_SERVICE_URL: http://model-service:8009
      # Agent 多轮记忆落 PG（默认 memory 是进程内 RAM，重启即失忆）。checkpoint 表 langgraph 自治、
      # 首次 agent 调用 setup() 幂等建（不入 Alembic）。仅 api 需要——worker 不跑 agent。
      CHECKPOINT_BACKEND: postgres
      # 检索相关性阈值（按 vector.search 日志实测调出：噪声≤0.27、相关≥0.47，取 0.35 分界）。
      # 低于此分数的 chunk 丢弃→无相关时返回空→agent 据 grounding 如实回"无相关内容"。
      RETRIEVAL_SCORE_THRESHOLD: "0.35"
      HF_HOME: /models                # Docling 的 HF 模型缓存目录 → 落到持久卷
      HF_HUB_OFFLINE: "1"             # 模型已预热进 model_cache 卷，运行时离线使用、不碰网络
    volumes:
      - storage_data:/app/storage     # 和 worker 共享同一块磁盘
      - model_cache:/models           # Docling/HF 模型缓存（已预热，跨重建存活）
    depends_on:
      postgres:
        condition: service_healthy    # 等 postgres healthcheck 通过
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      model-service:
        condition: service_healthy

  worker:
    build: .
    restart: unless-stopped
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info --pool=solo
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:papermoon@postgres:5432/papermoon
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      MODEL_SERVICE_URL: http://model-service:8009
      HF_HOME: /models                # Docling 的 HF 模型缓存目录 → 落到持久卷
      HF_HUB_OFFLINE: "1"             # 模型已预热进 model_cache 卷，运行时离线使用、不碰网络
      PYTHONUNBUFFERED: "1"   # 关闭 Python 子进程输出缓冲，日志实时出现
    volumes:
      - storage_data:/app/storage     # 读取 api 写入的文件
      - model_cache:/models           # Docling/HF 模型缓存（已预热，跨重建存活）
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      model-service:
        condition: service_healthy

# ── 具名卷声明 ──────────────────────────────────────────────────

volumes:
  postgres_data:    # postgres 数据持久化
  qdrant_data:      # qdrant 向量数据持久化
  storage_data:     # api 和 worker 之间共享的文件存储
  model_cache:      # Docling/HF 模型缓存（首个 PDF 下载一次，跨重建存活）
